<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale blue-gray background (map/satellite feel) -->
  <rect width="464" height="167" fill="#D8DFE8"/>

  <!-- subtle grid lines (map/satellite overlay feel) -->
  <g stroke="#5D70D2" stroke-width="0.3" opacity="0.15">
    <line x1="0" y1="40" x2="464" y2="40"/>
    <line x1="0" y1="80" x2="464" y2="80"/>
    <line x1="0" y1="120" x2="464" y2="120"/>
    <line x1="120" y1="0" x2="120" y2="167"/>
    <line x1="240" y1="0" x2="240" y2="167"/>
    <line x1="360" y1="0" x2="360" y2="167"/>
  </g>

  <!-- soft ground -->
  <path d="M 0 158 C 120 152, 344 152, 464 158 L 464 167 L 0 167 Z" fill="#7D8DDB" opacity="0.35"/>

  <!-- decorative dots -->
  <g fill="#5D70D2">
    <circle cx="22" cy="22" r="2.2" opacity="0.45"/>
    <circle cx="440" cy="30" r="1.8" opacity="0.4"/>
    <circle cx="40" cy="130" r="1.5" opacity="0.4"/>
  </g>

  <!-- ============ CLUSTER OF BUILDINGS (right side, aerial/map view) ============ -->

  <!-- Building 1 (tall, back-left) -->
  <rect x="258" y="52" width="42" height="106" fill="#adb5bd"/>
  <rect x="258" y="52" width="10" height="106" fill="#6c757d" opacity="0.35"/>
  <rect x="258" y="48" width="42" height="6" fill="#495057"/>
  <!-- windows -->
  <g fill="#5D70D2" opacity="0.55">
    <rect x="265" y="60" width="7" height="6" rx="0.5"/>
    <rect x="278" y="60" width="7" height="6" rx="0.5"/>
    <rect x="289" y="60" width="7" height="6" rx="0.5"/>
    <rect x="265" y="72" width="7" height="6" rx="0.5"/>
    <rect x="278" y="72" width="7" height="6" rx="0.5"/>
    <rect x="289" y="72" width="7" height="6" rx="0.5"/>
    <rect x="265" y="84" width="7" height="6" rx="0.5"/>
    <rect x="278" y="84" width="7" height="6" rx="0.5"/>
    <rect x="289" y="84" width="7" height="6" rx="0.5"/>
    <rect x="265" y="96" width="7" height="6" rx="0.5"/>
    <rect x="278" y="96" width="7" height="6" rx="0.5"/>
    <rect x="289" y="96" width="7" height="6" rx="0.5"/>
  </g>
  <!-- door -->
  <rect x="274" y="138" width="14" height="20" rx="1" fill="#252D54"/>
  <circle cx="285" cy="148" r="1.2" fill="#FEAF31"/>

  <!-- Building 2 (medium, right) -->
  <rect x="310" y="82" width="52" height="76" fill="#c5ccd4"/>
  <rect x="310" y="82" width="12" height="76" fill="#6c757d" opacity="0.3"/>
  <!-- flat roof accent -->
  <rect x="310" y="78" width="52" height="6" fill="#6c757d"/>
  <!-- windows -->
  <g fill="#5D70D2" opacity="0.5">
    <rect x="318" y="90" width="8" height="7" rx="0.5"/>
    <rect x="332" y="90" width="8" height="7" rx="0.5"/>
    <rect x="346" y="90" width="8" height="7" rx="0.5"/>
    <rect x="318" y="104" width="8" height="7" rx="0.5"/>
    <rect x="332" y="104" width="8" height="7" rx="0.5"/>
    <rect x="346" y="104" width="8" height="7" rx="0.5"/>
    <rect x="318" y="118" width="8" height="7" rx="0.5"/>
    <rect x="332" y="118" width="8" height="7" rx="0.5"/>
    <rect x="346" y="118" width="8" height="7" rx="0.5"/>
  </g>
  <!-- door -->
  <rect x="335" y="140" width="12" height="18" rx="1" fill="#252D54"/>

  <!-- Building 3 (small house, far right) -->
  <rect x="372" y="112" width="46" height="46" fill="#b8c0c9"/>
  <rect x="372" y="112" width="10" height="46" fill="#6c757d" opacity="0.3"/>
  <!-- pitched roof -->
  <polygon points="368,112 395,88 422,112" fill="#495057"/>
  <polygon points="368,112 395,88 398,92 372,112" fill="#343a40"/>
  <!-- window -->
  <rect x="380" y="122" width="10" height="9" rx="0.5" fill="#5D70D2" opacity="0.55"/>
  <line x1="385" y1="122" x2="385" y2="131" stroke="#252D54" stroke-width="0.5"/>
  <line x1="380" y1="126.5" x2="390" y2="126.5" stroke="#252D54" stroke-width="0.5"/>
  <!-- door -->
  <rect x="400" y="138" width="10" height="20" rx="1" fill="#252D54"/>
  <circle cx="407" cy="148" r="1" fill="#FEAF31"/>

  <!-- Building 4 (small, back-right, partially behind) -->
  <rect x="420" y="98" width="34" height="60" fill="#adb5bd"/>
  <rect x="420" y="94" width="34" height="6" fill="#6c757d"/>
  <g fill="#5D70D2" opacity="0.45">
    <rect x="426" y="106" width="6" height="5" rx="0.5"/>
    <rect x="440" y="106" width="6" height="5" rx="0.5"/>
    <rect x="426" y="118" width="6" height="5" rx="0.5"/>
    <rect x="440" y="118" width="6" height="5" rx="0.5"/>
  </g>

  <!-- ============ SAMPLING SELECTION MARKERS (circles around sampled buildings) ============ -->
  <!-- dashed selection circle on building 1 -->
  <circle cx="279" cy="105" r="32" fill="none" stroke="#E13019" stroke-width="1.8" stroke-dasharray="5 3" opacity="0.8"/>
  <!-- dashed selection circle on building 3 -->
  <circle cx="395" cy="130" r="30" fill="none" stroke="#E13019" stroke-width="1.8" stroke-dasharray="5 3" opacity="0.8"/>

  <!-- selection checkmarks -->
  <g>
    <!-- check badge on building 1 -->
    <circle cx="303" cy="78" r="8" fill="#358623"/>
    <path d="M 298 78 L 301 81 L 308 74" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- check badge on building 3 -->
    <circle cx="418" cy="104" r="8" fill="#358623"/>
    <path d="M 413 104 L 416 107 L 423 100" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============ PERSON WITH TABLET (left side) ============ -->
  <!-- shoes -->
  <ellipse cx="96" cy="161" rx="13" ry="3.2" fill="#13162A"/>
  <ellipse cx="126" cy="161" rx="13" ry="3.2" fill="#13162A"/>

  <!-- pants -->
  <path d="M 82 110 C 82 130, 80 152, 84 158 Q 96 162, 108 158 L 110 110 Z" fill="#252D54"/>
  <path d="M 112 110 L 114 158 Q 126 162, 138 158 C 142 152, 140 130, 140 110 Z" fill="#252D54"/>

  <!-- belt -->
  <rect x="80" y="106" width="62" height="5" rx="1.5" fill="#13162A"/>

  <!-- shirt (CommCare blue) -->
  <path d="M 84 60 C 84 54, 92 50, 104 50 L 112 50 C 124 50, 132 54, 132 60 Q 138 80, 140 110 L 82 110 Q 84 80, 84 60 Z" fill="#5D70D2"/>
  <path d="M 84 60 C 84 54, 92 50, 102 50 L 102 110 L 82 110 Q 84 80, 84 60 Z" fill="#38437E" opacity="0.3"/>
  <!-- collar -->
  <path d="M 98 50 L 108 64 L 118 50 L 114 50 L 108 60 L 102 50 Z" fill="#fff" opacity="0.85"/>

  <!-- left arm at side -->
  <path d="M 80 62 C 72 80, 72 100, 76 110 L 88 110 Q 90 80, 88 62 Z" fill="#5D70D2"/>
  <path d="M 80 62 C 72 80, 72 100, 76 110 L 80 110 Q 80 80, 82 62 Z" fill="#38437E" opacity="0.3"/>
  <ellipse cx="81" cy="111" rx="6" ry="3" fill="#38437E"/>
  <circle cx="80" cy="116" r="5" fill="#B5825D"/>

  <!-- right arm bent forward holding tablet -->
  <path d="M 132 62 C 142 70, 150 80, 148 94 Q 142 98, 136 94 C 136 80, 132 70, 128 64 Z" fill="#5D70D2"/>
  <ellipse cx="144" cy="94" rx="7" ry="4" fill="#38437E" transform="rotate(20 144 94)"/>
  <path d="M 138 92 Q 142 100, 152 102 Q 158 100, 158 96 Q 154 90, 142 88 Z" fill="#B5825D"/>
  <circle cx="156" cy="100" r="6" fill="#B5825D"/>

  <!-- neck -->
  <rect x="103" y="48" width="10" height="8" fill="#B5825D"/>
  <rect x="103" y="48" width="4" height="8" fill="#9c6b48" opacity="0.4"/>

  <!-- head -->
  <circle cx="108" cy="32" r="18" fill="#B5825D"/>
  <path d="M 90 32 A 18 18 0 0 1 108 14 L 108 50 A 18 18 0 0 1 90 32 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="91" cy="33" rx="2" ry="3" fill="#9c6b48"/>
  <ellipse cx="125" cy="33" rx="2" ry="3" fill="#9c6b48"/>

  <!-- hair -->
  <path d="M 90 28 C 90 12, 98 8, 108 8 C 118 8, 126 12, 126 28 C 124 22, 118 20, 114 22 C 110 16, 102 16, 98 22 C 94 20, 92 22, 90 28 Z" fill="#2D2825"/>

  <!-- ============ TABLET WITH MAP/BUILDING DATA ============ -->
  <g transform="translate(166,98) rotate(-12)">
    <!-- tablet body -->
    <rect x="-18" y="-24" width="36" height="52" rx="3" fill="#252D54"/>
    <!-- screen -->
    <rect x="-15" y="-21" width="30" height="42" rx="1" fill="#fff"/>
    <!-- screen header bar -->
    <rect x="-15" y="-21" width="30" height="6" rx="1" fill="#5D70D2"/>
    <!-- mini map on screen -->
    <rect x="-12" y="-12" width="24" height="18" fill="#e9ecef" rx="1"/>
    <!-- mini buildings on map -->
    <rect x="-9" y="-6" width="5" height="10" fill="#adb5bd"/>
    <rect x="-1" y="-2" width="6" height="6" fill="#c5ccd4"/>
    <rect x="8" y="-8" width="5" height="12" fill="#adb5bd"/>
    <!-- selection dot on map -->
    <circle cx="-6" cy="-1" r="2" fill="#E13019" opacity="0.8"/>
    <circle cx="10" cy="-2" r="2" fill="#E13019" opacity="0.8"/>
    <!-- mini roads -->
    <line x1="-12" y1="2" x2="12" y2="2" stroke="#6c757d" stroke-width="0.6" opacity="0.5"/>
    <!-- data row below map -->
    <line x1="-10" y1="10" x2="4" y2="10" stroke="#6c757d" stroke-width="0.8"/>
    <rect x="-10" y="12" width="4" height="3" rx="0.5" fill="#358623"/>
    <line x1="-4" y1="14" x2="10" y2="14" stroke="#adb5bd" stroke-width="0.6"/>
    <!-- home button -->
    <circle cx="0" cy="24" r="1.5" fill="#fff" stroke="#adb5bd" stroke-width="0.4"/>
  </g>

  <!-- ============ CONNECTING LINES (person → buildings, data flow) ============ -->
  <g stroke="#FEAF31" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.6">
    <line x1="190" y1="85" x2="250" y2="80"/>
  </g>

  <!-- floating data sparkles (sampling indicators) -->
  <g fill="#FEAF31" opacity="0.7">
    <circle cx="210" cy="42" r="2.2"/>
    <circle cx="226" cy="56" r="1.6"/>
    <circle cx="215" cy="70" r="1.4"/>
  </g>

  <!-- small location pin accent (top area) -->
  <g transform="translate(232,24)" fill="#E13019" opacity="0.65">
    <path d="M 0 -8 C -4 -8, -7 -5, -7 -2 C -7 2, 0 10, 0 10 C 0 10, 7 2, 7 -2 C 7 -5, 4 -8, 0 -8 Z"/>
    <circle cx="0" cy="-2" r="2.5" fill="#fff" opacity="0.8"/>
  </g>
</svg>
