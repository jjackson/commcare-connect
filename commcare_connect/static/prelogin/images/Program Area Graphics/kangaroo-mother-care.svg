<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale salmon background -->
  <rect width="464" height="167" fill="#f5dedf"/>

  <!-- decorative dots -->
  <g fill="#cb585d">
    <circle cx="30"  cy="25"  r="2.5" opacity="0.4"/>
    <circle cx="60"  cy="55"  r="1.8" opacity="0.5"/>
    <circle cx="40"  cy="100" r="2"   opacity="0.4"/>
    <circle cx="22"  cy="135" r="1.8" opacity="0.4"/>
    <circle cx="408" cy="22"  r="2.5" opacity="0.4"/>
    <circle cx="438" cy="80"  r="2.5" opacity="0.35"/>
    <circle cx="406" cy="135" r="2"   opacity="0.45"/>
    <circle cx="448" cy="52"  r="1.8" opacity="0.4"/>
  </g>

  <!-- soft heart background -->
  <g transform="translate(132,8)" opacity="0.4">
    <path d="M 100 152 C -10 80, -10 18, 100 40 C 210 18, 210 80, 100 152 Z" fill="#d7b9cd"/>
  </g>

  <!-- ============ MOTHER ============ -->
  <!-- dress (long flowing salmon) -->
  <path d="M 198 56
           C 198 50, 214 46, 232 46
           C 250 46, 266 50, 266 56
           Q 286 90, 304 167
           L 160 167
           Q 178 90, 198 56 Z"
        fill="#cb585d"/>

  <!-- dress left-side shadow for depth -->
  <path d="M 198 56
           C 198 50, 214 46, 226 46
           L 226 80
           Q 220 110, 218 140
           L 222 167
           L 160 167
           Q 178 90, 198 56 Z"
        fill="#a2464a" opacity="0.3"/>

  <!-- dress hem darker -->
  <path d="M 168 146
           C 200 152, 264 152, 296 146
           C 300 154, 302 160, 304 167
           L 160 167
           C 162 160, 164 154, 168 146 Z"
        fill="#7a3538"/>

  <!-- subtle dress neckline -->
  <path d="M 222 50 C 228 56, 236 56, 242 50" stroke="#7a3538" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- neck -->
  <rect x="227" y="44" width="10" height="8" fill="#B5825D"/>
  <rect x="227" y="44" width="3.5" height="8" fill="#9c6b48" opacity="0.4"/>

  <!-- mother head -->
  <circle cx="232" cy="28" r="17" fill="#B5825D"/>
  <!-- head shadow -->
  <path d="M 215 28 A 17 17 0 0 1 232 11 L 232 45 A 17 17 0 0 1 215 28 Z" fill="#9c6b48" opacity="0.3"/>

  <!-- ears -->
  <ellipse cx="215" cy="29" rx="1.8" ry="2.5" fill="#9c6b48"/>
  <ellipse cx="249" cy="29" rx="1.8" ry="2.5" fill="#9c6b48"/>

  <!-- earrings -->
  <circle cx="215" cy="34" r="1.6" fill="#FEAF31"/>
  <circle cx="249" cy="34" r="1.6" fill="#FEAF31"/>

  <!-- head wrap (multi-layer) -->
  <!-- base wrap -->
  <path d="M 214 26
           C 214 8, 222 4, 232 4
           C 242 4, 250 8, 250 26
           Q 248 23, 244 21
           Q 240 17, 232 17
           Q 224 17, 220 21
           Q 216 23, 214 26 Z" fill="#FEAF31"/>
  <!-- wrap fold band -->
  <path d="M 215 22 C 222 16, 242 16, 249 22 C 246 24, 240 22, 232 22 C 224 22, 218 24, 215 22 Z" fill="#cb585d" opacity="0.65"/>
  <!-- wrap highlight -->
  <path d="M 222 8 C 228 6, 236 6, 242 8 C 236 10, 228 10, 222 10 Z" fill="#FFD78A" opacity="0.8"/>
  <!-- wrap knot/end at side -->
  <path d="M 248 18 C 256 16, 258 22, 254 26 C 250 26, 248 22, 248 18 Z" fill="#cb585d"/>
  <ellipse cx="253" cy="20" rx="2" ry="2.5" fill="#a2464a" opacity="0.7"/>

  <!-- ============ MOTHER'S HANDS supporting wrap ============ -->
  <!-- left hand (cradling) -->
  <ellipse cx="186" cy="106" rx="9" ry="7" fill="#B5825D"/>
  <ellipse cx="186" cy="108" rx="9" ry="2.5" fill="#9c6b48" opacity="0.4"/>
  <!-- left thumb hint -->
  <ellipse cx="194" cy="100" rx="3" ry="4" fill="#B5825D" transform="rotate(30 194 100)"/>

  <!-- right hand (cradling) -->
  <ellipse cx="278" cy="106" rx="9" ry="7" fill="#B5825D"/>
  <ellipse cx="278" cy="108" rx="9" ry="2.5" fill="#9c6b48" opacity="0.4"/>
  <ellipse cx="270" cy="100" rx="3" ry="4" fill="#B5825D" transform="rotate(-30 270 100)"/>

  <!-- ============ BABYWEARING WRAP ============ -->
  <!-- main wrap pouch -->
  <path d="M 184 100
           C 200 90, 264 90, 280 100
           C 298 122, 288 148, 232 158
           C 176 148, 166 122, 184 100 Z"
        fill="#FEAF31"/>
  <!-- wrap left-shadow -->
  <path d="M 184 100
           C 200 90, 232 88, 232 100
           L 232 158
           C 176 148, 166 122, 184 100 Z"
        fill="#cb585d" opacity="0.22"/>
  <!-- wrap fold lines -->
  <path d="M 192 110 C 220 102, 250 102, 272 110" stroke="#cb585d" stroke-width="1.4" fill="none" opacity="0.5"/>
  <path d="M 188 130 C 220 134, 252 134, 280 128" stroke="#cb585d" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- shoulder strap going up over right shoulder -->
  <path d="M 278 100
           C 298 78, 286 54, 270 52
           C 258 56, 258 78, 256 100 Z"
        fill="#FEAF31"/>
  <!-- strap shadow -->
  <path d="M 278 100 C 296 78, 286 54, 272 52 L 272 60 Q 282 78, 274 92 Z" fill="#cb585d" opacity="0.25"/>
  <!-- strap fold -->
  <path d="M 266 60 C 274 64, 286 78, 282 92" stroke="#cb585d" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- ============ BABY ============ -->
  <!-- baby head -->
  <circle cx="232" cy="86" r="13" fill="#D4A77C"/>
  <!-- baby head shadow -->
  <path d="M 219 86 A 13 13 0 0 1 232 73 L 232 99 A 13 13 0 0 1 219 86 Z" fill="#a87a52" opacity="0.3"/>
  <!-- baby ear -->
  <ellipse cx="220" cy="87" rx="1.4" ry="2" fill="#a87a52"/>
  <ellipse cx="244" cy="87" rx="1.4" ry="2" fill="#a87a52"/>
  <!-- baby hair tuft -->
  <path d="M 220 79
           C 222 71, 242 71, 244 79
           C 244 79, 240 76, 232 76
           C 224 76, 220 79, 220 79 Z" fill="#2D2825"/>
  <!-- subtle baby hair highlight -->
  <path d="M 226 73 C 230 71, 238 71, 240 74 C 234 73, 228 73, 226 74 Z" fill="#5a4d44" opacity="0.6"/>

  <!-- baby tiny hand peeking from top of wrap -->
  <ellipse cx="220" cy="105" rx="5" ry="4" fill="#D4A77C"/>
  <ellipse cx="220" cy="106" rx="5" ry="1.2" fill="#a87a52" opacity="0.4"/>

  <!-- baby foot peeking out lower-right of wrap -->
  <ellipse cx="280" cy="140" rx="7.5" ry="5.5" fill="#D4A77C"/>
  <ellipse cx="280" cy="141" rx="7.5" ry="1.5" fill="#a87a52" opacity="0.4"/>
  <!-- toes hint -->
  <circle cx="276" cy="138" r="1" fill="#a87a52" opacity="0.5"/>
  <circle cx="280" cy="137" r="1" fill="#a87a52" opacity="0.5"/>
  <circle cx="284" cy="138" r="1" fill="#a87a52" opacity="0.5"/>

  <!-- small heart accent (decorative) -->
  <g transform="translate(380,42)">
    <path d="M 0 4 C -7 -4 -14 -4 -14 3 C -14 10 0 18 0 18 C 0 18 14 10 14 3 C 14 -4 7 -4 0 4 Z"
          fill="#9a5183" opacity="0.75"/>
    <path d="M 0 6 C -4 -1 -10 0 -10 4 C -10 8 -2 13 0 14 Z" fill="#7b4169" opacity="0.5"/>
  </g>
</svg>
