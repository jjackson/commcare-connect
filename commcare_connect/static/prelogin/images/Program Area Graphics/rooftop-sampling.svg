<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale sky background -->
  <rect width="464" height="167" fill="#DCE6F0"/>

  <!-- soft ground -->
  <path d="M 0 158 C 120 152, 344 152, 464 158 L 464 167 L 0 167 Z" fill="#7D8DDB" opacity="0.4"/>

  <!-- decorative dots -->
  <g fill="#5D70D2">
    <circle cx="22" cy="22" r="2.2" opacity="0.45"/>
    <circle cx="48" cy="50" r="1.6" opacity="0.4"/>
    <circle cx="200" cy="18" r="1.8" opacity="0.4"/>
    <circle cx="448" cy="100" r="2" opacity="0.4"/>
    <circle cx="40" cy="125" r="1.5" opacity="0.4"/>
  </g>

  <!-- soft cloud (atmospheric cue) -->
  <g fill="#fff" opacity="0.7">
    <ellipse cx="362" cy="32" rx="14" ry="8"/>
    <ellipse cx="375" cy="28" rx="10" ry="7"/>
    <ellipse cx="350" cy="34" rx="8" ry="6"/>
  </g>
  <g fill="#fff" opacity="0.5">
    <ellipse cx="80" cy="20" rx="10" ry="5"/>
    <ellipse cx="92" cy="18" rx="7" ry="4"/>
  </g>

  <!-- ============ HOUSE WITH ROOFTOP SAMPLING DEVICE ============ -->
  <!-- house body -->
  <rect x="270" y="100" width="156" height="58" fill="#adb5bd"/>
  <!-- house shadow side -->
  <rect x="270" y="100" width="32" height="58" fill="#6c757d" opacity="0.4"/>
  <!-- roof -->
  <polygon points="260,100 348,60 436,100" fill="#495057"/>
  <polygon points="260,100 348,60 354,68 268,100" fill="#343a40"/>
  <!-- door -->
  <rect x="328" y="118" width="28" height="40" rx="1" fill="#252D54"/>
  <circle cx="350" cy="138" r="1.5" fill="#FEAF31"/>
  <!-- windows -->
  <rect x="284" y="112" width="16" height="14" rx="1" fill="#5D70D2" opacity="0.7"/>
  <line x1="292" y1="112" x2="292" y2="126" stroke="#252D54" stroke-width="0.6"/>
  <line x1="284" y1="119" x2="300" y2="119" stroke="#252D54" stroke-width="0.6"/>
  <rect x="384" y="112" width="16" height="14" rx="1" fill="#5D70D2" opacity="0.7"/>
  <line x1="392" y1="112" x2="392" y2="126" stroke="#252D54" stroke-width="0.6"/>
  <line x1="384" y1="119" x2="400" y2="119" stroke="#252D54" stroke-width="0.6"/>

  <!-- ============ ROOFTOP SAMPLING DEVICE ============ -->
  <!-- mounting pole -->
  <rect x="346" y="46" width="4" height="20" fill="#252D54"/>
  <!-- collection funnel (rainwater/air sampler) -->
  <path d="M 330 30 L 366 30 L 358 46 L 338 46 Z" fill="#FEAF31"/>
  <path d="M 330 30 L 366 30 L 366 33 L 330 33 Z" fill="#FFC571"/>
  <!-- collection container -->
  <rect x="338" y="46" width="20" height="14" rx="1" fill="#fff" stroke="#252D54" stroke-width="0.8"/>
  <rect x="340" y="50" width="16" height="9" rx="0.5" fill="#5D70D2" opacity="0.6"/>
  <!-- antenna/sensor -->
  <line x1="348" y1="20" x2="348" y2="30" stroke="#252D54" stroke-width="1.5"/>
  <circle cx="348" cy="18" r="2" fill="#E13019"/>
  <!-- side support -->
  <line x1="346" y1="60" x2="338" y2="68" stroke="#252D54" stroke-width="1"/>
  <line x1="350" y1="60" x2="358" y2="68" stroke="#252D54" stroke-width="1"/>

  <!-- water drops being collected (atmospheric cue) -->
  <g fill="#5D70D2" opacity="0.7">
    <ellipse cx="335" cy="20" rx="1.5" ry="2.5"/>
    <ellipse cx="362" cy="22" rx="1.4" ry="2.2"/>
    <ellipse cx="348" cy="14" rx="1.2" ry="2"/>
  </g>

  <!-- ============ TECHNICIAN (left, holding sample vial) ============ -->
  <!-- shoes -->
  <ellipse cx="116" cy="161" rx="13" ry="3.2" fill="#13162A"/>
  <ellipse cx="146" cy="161" rx="13" ry="3.2" fill="#13162A"/>

  <path d="M 102 110 C 102 130, 100 152, 104 158 Q 116 162, 128 158 L 130 110 Z" fill="#22287d"/>
  <path d="M 132 110 L 134 158 Q 146 162, 158 158 C 162 152, 160 130, 160 110 Z" fill="#22287d"/>

  <rect x="100" y="106" width="62" height="5" rx="1.5" fill="#13162A"/>

  <!-- shirt (deep indigo, technical/research) -->
  <path d="M 104 60 C 104 54, 112 50, 124 50 L 132 50 C 144 50, 152 54, 152 60 Q 158 80, 160 110 L 102 110 Q 104 80, 104 60 Z" fill="#3843D0"/>
  <path d="M 104 60 C 104 54, 112 50, 122 50 L 122 110 L 102 110 Q 104 80, 104 60 Z" fill="#22287d" opacity="0.4"/>
  <path d="M 118 50 L 128 64 L 138 50 L 134 50 L 128 60 L 122 50 Z" fill="#fff" opacity="0.85"/>

  <!-- left arm at side -->
  <path d="M 100 62 C 92 80, 92 100, 96 110 L 108 110 Q 110 80, 108 62 Z" fill="#3843D0"/>
  <ellipse cx="101" cy="111" rx="6" ry="3" fill="#22287d"/>
  <circle cx="100" cy="116" r="5" fill="#B5825D"/>

  <!-- right arm bent forward holding sample vial -->
  <path d="M 152 62 C 162 70, 170 80, 168 94 Q 162 98, 156 94 C 156 80, 152 70, 148 64 Z" fill="#3843D0"/>
  <ellipse cx="164" cy="94" rx="7" ry="4" fill="#22287d" transform="rotate(20 164 94)"/>
  <path d="M 158 92 Q 162 100, 172 102 Q 178 100, 178 96 Q 174 90, 162 88 Z" fill="#B5825D"/>
  <circle cx="176" cy="100" r="6" fill="#B5825D"/>

  <!-- neck -->
  <rect x="123" y="48" width="10" height="8" fill="#B5825D"/>
  <rect x="123" y="48" width="4" height="8" fill="#9c6b48" opacity="0.4"/>

  <!-- head -->
  <circle cx="128" cy="32" r="18" fill="#B5825D"/>
  <path d="M 110 32 A 18 18 0 0 1 128 14 L 128 50 A 18 18 0 0 1 110 32 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="111" cy="33" rx="2" ry="3" fill="#9c6b48"/>
  <ellipse cx="145" cy="33" rx="2" ry="3" fill="#9c6b48"/>

  <!-- hair -->
  <path d="M 110 28 C 110 12, 118 8, 128 8 C 138 8, 146 12, 146 28 C 144 22, 138 20, 134 22 C 130 16, 122 16, 118 22 C 114 20, 112 22, 110 28 Z" fill="#2D2825"/>

  <!-- ============ SAMPLE VIAL (held in hand) ============ -->
  <g transform="translate(180,98) rotate(-15)">
    <!-- vial cap -->
    <rect x="-4" y="-20" width="8" height="5" rx="1.5" fill="#E13019"/>
    <!-- vial body (test tube) -->
    <path d="M -5 -15
             L 5 -15
             L 5 14
             Q 5 18, 0 18
             Q -5 18, -5 14 Z" fill="#fff" stroke="#252D54" stroke-width="0.7" opacity="0.9"/>
    <!-- liquid inside -->
    <path d="M -4 0 L 4 0 L 4 13 Q 4 17, 0 17 Q -4 17, -4 13 Z" fill="#5D70D2" opacity="0.65"/>
    <!-- highlight -->
    <rect x="-4" y="-13" width="1.5" height="28" fill="#fff" opacity="0.8"/>
    <!-- label -->
    <rect x="-4" y="-3" width="8" height="3" fill="#fff"/>
  </g>

  <!-- floating data/research sparkles -->
  <g fill="#FEAF31" opacity="0.7">
    <circle cx="220" cy="38" r="2"/>
    <circle cx="240" cy="50" r="1.6"/>
    <circle cx="220" cy="62" r="1.4"/>
  </g>
</svg>
