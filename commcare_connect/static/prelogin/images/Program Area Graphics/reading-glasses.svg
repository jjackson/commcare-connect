<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale pink background -->
  <rect width="464" height="167" fill="#ebdce6"/>

  <!-- soft ground -->
  <path d="M 0 158 C 120 152, 344 152, 464 158 L 464 167 L 0 167 Z" fill="#c297b5" opacity="0.5"/>

  <!-- decorative dots -->
  <g fill="#9a5183">
    <circle cx="22" cy="22" r="2.2" opacity="0.45"/>
    <circle cx="48" cy="50" r="1.6" opacity="0.4"/>
    <circle cx="290" cy="18" r="1.8" opacity="0.45"/>
    <circle cx="380" cy="22" r="2" opacity="0.45"/>
    <circle cx="448" cy="100" r="2" opacity="0.4"/>
    <circle cx="438" cy="58" r="1.6" opacity="0.4"/>
    <circle cx="40" cy="125" r="1.5" opacity="0.4"/>
  </g>

  <!-- sun -->
  <g transform="translate(420,28)">
    <circle r="14" fill="#FEAF31"/>
    <circle r="10" fill="#FFC571"/>
    <circle r="5" fill="#FFE4B0"/>
  </g>

  <!-- ============ FIGURE (older adult reading) ============ -->
  <!-- shoes -->
  <ellipse cx="190" cy="161" rx="13" ry="3.2" fill="#1f101a"/>
  <ellipse cx="220" cy="161" rx="13" ry="3.2" fill="#1f101a"/>
  <ellipse cx="187" cy="159.5" rx="6" ry="1.2" fill="#3e2034" opacity="0.7"/>
  <ellipse cx="217" cy="159.5" rx="6" ry="1.2" fill="#3e2034" opacity="0.7"/>

  <!-- pants -->
  <path d="M 176 110 C 176 130, 174 152, 178 158 Q 190 162, 202 158 L 204 110 Z" fill="#3e2034"/>
  <path d="M 206 110 L 208 158 Q 220 162, 232 158 C 236 152, 234 130, 234 110 Z" fill="#3e2034"/>
  <path d="M 179 114 L 182 156 Q 183 158 187 158 L 184 114 Z" fill="#1f101a" opacity="0.5"/>
  <path d="M 211 114 L 212 158 Q 213 158 216 158 L 214 114 Z" fill="#1f101a" opacity="0.5"/>

  <!-- belt -->
  <rect x="174" y="106" width="62" height="5" rx="1.5" fill="#1f101a"/>

  <!-- shirt -->
  <path d="M 178 60 C 178 54, 186 50, 198 50 L 206 50 C 218 50, 226 54, 226 60 Q 232 80, 234 110 L 176 110 Q 178 80, 178 60 Z" fill="#9a5183"/>
  <path d="M 178 60 C 178 54, 186 50, 196 50 L 196 110 L 176 110 Q 178 80, 178 60 Z" fill="#5c314f" opacity="0.3"/>
  <!-- shirt collar -->
  <path d="M 192 50 L 202 64 L 212 50 L 208 50 L 202 60 L 196 50 Z" fill="#fff" opacity="0.85"/>

  <!-- left arm at side -->
  <path d="M 174 62 C 166 80, 166 100, 170 110 L 182 110 Q 184 80, 182 62 Z" fill="#9a5183"/>
  <path d="M 174 62 C 166 80, 166 100, 170 110 L 174 110 Q 174 80, 176 62 Z" fill="#5c314f" opacity="0.3"/>
  <ellipse cx="175" cy="111" rx="6" ry="3" fill="#5c314f"/>
  <circle cx="174" cy="116" r="5" fill="#B5825D"/>

  <!-- right arm bent forward holding book -->
  <path d="M 226 62 C 236 70, 244 82, 242 96 Q 236 100, 230 96 C 230 82, 226 72, 222 64 Z" fill="#9a5183"/>
  <ellipse cx="238" cy="96" rx="7" ry="4" fill="#5c314f" transform="rotate(20 238 96)"/>
  <path d="M 232 95 Q 236 102, 246 104 Q 252 104, 252 100 Q 248 92, 236 90 Z" fill="#B5825D"/>
  <circle cx="250" cy="102" r="6" fill="#B5825D"/>

  <!-- neck -->
  <rect x="197" y="48" width="10" height="8" fill="#B5825D"/>
  <rect x="197" y="48" width="4" height="8" fill="#9c6b48" opacity="0.4"/>

  <!-- head -->
  <circle cx="202" cy="32" r="18" fill="#B5825D"/>
  <path d="M 184 32 A 18 18 0 0 1 202 14 L 202 50 A 18 18 0 0 1 184 32 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="185" cy="33" rx="2" ry="3" fill="#9c6b48"/>
  <ellipse cx="219" cy="33" rx="2" ry="3" fill="#9c6b48"/>

  <!-- gray hair (older adult) -->
  <path d="M 184 28 C 184 14, 192 10, 202 10 C 212 10, 220 14, 220 28 C 218 22, 212 20, 208 22 C 204 16, 196 16, 192 22 C 188 20, 186 22, 184 28 Z" fill="#6c757d"/>
  <path d="M 190 16 C 196 12, 208 12, 214 16 C 208 14, 196 14, 190 16 Z" fill="#adb5bd" opacity="0.7"/>

  <!-- glasses (prominent reading glasses) -->
  <g transform="translate(202, 38)">
    <!-- left lens -->
    <circle cx="-7" cy="0" r="6.5" fill="#fff" fill-opacity="0.4" stroke="#1f101a" stroke-width="1.5"/>
    <!-- right lens -->
    <circle cx="7" cy="0" r="6.5" fill="#fff" fill-opacity="0.4" stroke="#1f101a" stroke-width="1.5"/>
    <!-- bridge -->
    <path d="M -1 -1 L 1 -1 L 1 1 L -1 1 Z" fill="#1f101a"/>
    <!-- temples (earpieces) -->
    <line x1="-13.5" y1="0" x2="-17" y2="-2" stroke="#1f101a" stroke-width="1.5"/>
    <line x1="13.5" y1="0" x2="17" y2="-2" stroke="#1f101a" stroke-width="1.5"/>
  </g>

  <!-- ============ OPEN BOOK (held in right hand) ============ -->
  <g transform="translate(264,108) rotate(-5)">
    <!-- book shadow -->
    <ellipse cx="0" cy="22" rx="34" ry="3" fill="#1f101a" opacity="0.2"/>
    <!-- left page -->
    <path d="M -34 -16 L -2 -19 L -2 18 L -34 15 Z" fill="#fff" stroke="#5c314f" stroke-width="0.8"/>
    <!-- right page -->
    <path d="M 2 -19 L 34 -16 L 34 15 L 2 18 Z" fill="#fff" stroke="#5c314f" stroke-width="0.8"/>
    <!-- spine -->
    <path d="M -2 -19 L 2 -19 L 2 18 L -2 18 Z" fill="#ebdce6"/>
    <!-- text lines left page -->
    <line x1="-29" y1="-10" x2="-7" y2="-11" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="-29" y1="-5" x2="-7" y2="-6" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="-29" y1="0" x2="-7" y2="-1" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="-29" y1="5" x2="-7" y2="4" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="-29" y1="10" x2="-15" y2="9" stroke="#9a5183" stroke-width="1.2"/>
    <!-- text lines right page -->
    <line x1="7" y1="-11" x2="29" y2="-10" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="7" y1="-6" x2="29" y2="-5" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="7" y1="-1" x2="29" y2="0" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="7" y1="4" x2="29" y2="5" stroke="#9a5183" stroke-width="1.2"/>
    <line x1="7" y1="9" x2="22" y2="10" stroke="#9a5183" stroke-width="1.2"/>
  </g>

  <!-- ============ Decorative pair of glasses (floating accent) ============ -->
  <g transform="translate(380,55) rotate(-15)">
    <circle cx="-9" cy="0" r="8" fill="none" stroke="#5c314f" stroke-width="2"/>
    <circle cx="9" cy="0" r="8" fill="none" stroke="#5c314f" stroke-width="2"/>
    <path d="M -1 0 L 1 0" stroke="#5c314f" stroke-width="2"/>
  </g>
</svg>
