<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale purple background -->
  <rect width="464" height="167" fill="#e1dbee"/>

  <!-- soft ground -->
  <path d="M 0 158 C 120 152, 344 152, 464 158 L 464 167 L 0 167 Z" fill="#a592cc" opacity="0.45"/>

  <!-- decorative dots -->
  <g fill="#694aaa">
    <circle cx="22" cy="22" r="2.2" opacity="0.45"/>
    <circle cx="48" cy="50" r="1.6" opacity="0.4"/>
    <circle cx="290" cy="18" r="1.8" opacity="0.4"/>
    <circle cx="382" cy="22" r="2" opacity="0.45"/>
    <circle cx="448" cy="100" r="2" opacity="0.4"/>
    <circle cx="438" cy="58" r="1.6" opacity="0.4"/>
    <circle cx="40" cy="125" r="1.5" opacity="0.4"/>
  </g>

  <!-- sun -->
  <g transform="translate(420,28)">
    <circle r="14" fill="#FEAF31"/>
    <circle r="10" fill="#FFC571"/>
    <circle r="5" fill="#FFE4B0"/>
  </g>

  <!-- ============ PARENT (left) ============ -->
  <!-- shoes -->
  <ellipse cx="116" cy="161" rx="13" ry="3.2" fill="#15082a"/>
  <ellipse cx="146" cy="161" rx="13" ry="3.2" fill="#15082a"/>
  <ellipse cx="113" cy="159.5" rx="6" ry="1.2" fill="#3a2050" opacity="0.7"/>
  <ellipse cx="143" cy="159.5" rx="6" ry="1.2" fill="#3a2050" opacity="0.7"/>

  <!-- pants -->
  <path d="M 102 110 C 102 130, 100 152, 104 158 Q 116 162, 128 158 L 130 110 Z" fill="#2a1e44"/>
  <path d="M 132 110 L 134 158 Q 146 162, 158 158 C 162 152, 160 130, 160 110 Z" fill="#2a1e44"/>
  <path d="M 105 114 L 108 156 Q 109 158 113 158 L 110 114 Z" fill="#150f22" opacity="0.5"/>
  <path d="M 137 114 L 138 158 Q 139 158 142 158 L 140 114 Z" fill="#150f22" opacity="0.5"/>

  <!-- belt -->
  <rect x="100" y="106" width="62" height="5" rx="1.5" fill="#150f22"/>

  <!-- shirt -->
  <path d="M 104 60 C 104 54, 112 50, 124 50 L 132 50 C 144 50, 152 54, 152 60 Q 158 80, 160 110 L 102 110 Q 104 80, 104 60 Z" fill="#694aaa"/>
  <path d="M 104 60 C 104 54, 112 50, 122 50 L 122 110 L 102 110 Q 104 80, 104 60 Z" fill="#3f2c66" opacity="0.3"/>

  <!-- shirt collar -->
  <path d="M 118 50 L 128 64 L 138 50 L 134 50 L 128 60 L 122 50 Z" fill="#fff" opacity="0.85"/>

  <!-- left arm hanging at side -->
  <path d="M 100 62 C 92 80, 92 100, 96 110 L 108 110 Q 110 80, 108 62 Z" fill="#694aaa"/>
  <path d="M 100 62 C 92 80, 92 100, 96 110 L 100 110 Q 100 80, 102 62 Z" fill="#3f2c66" opacity="0.3"/>
  <ellipse cx="101" cy="111" rx="6" ry="3" fill="#3f2c66"/>
  <circle cx="100" cy="116" r="5" fill="#B5825D"/>

  <!-- right arm bent forward holding book -->
  <path d="M 152 62 C 162 70, 170 82, 168 96 Q 162 100, 156 96 C 156 82, 152 72, 148 64 Z" fill="#694aaa"/>
  <ellipse cx="164" cy="96" rx="7" ry="4" fill="#3f2c66" transform="rotate(20 164 96)"/>
  <path d="M 158 95 Q 162 102, 172 104 Q 178 104, 178 100 Q 174 92, 162 90 Z" fill="#B5825D"/>
  <circle cx="176" cy="102" r="6" fill="#B5825D"/>

  <!-- neck -->
  <rect x="123" y="48" width="10" height="8" fill="#B5825D"/>
  <rect x="123" y="48" width="4" height="8" fill="#9c6b48" opacity="0.4"/>

  <!-- head -->
  <circle cx="128" cy="32" r="18" fill="#B5825D"/>
  <path d="M 110 32 A 18 18 0 0 1 128 14 L 128 50 A 18 18 0 0 1 110 32 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="111" cy="33" rx="2" ry="3" fill="#9c6b48"/>
  <ellipse cx="145" cy="33" rx="2" ry="3" fill="#9c6b48"/>

  <!-- hair -->
  <path d="M 110 28 C 110 12, 118 8, 128 8 C 138 8, 146 12, 146 28 C 144 22, 138 20, 134 22 C 130 16, 122 16, 118 22 C 114 20, 112 22, 110 28 Z" fill="#2D2825"/>
  <path d="M 116 16 C 122 12, 134 12, 140 16 C 134 14, 122 14, 116 16 Z" fill="#4d4541" opacity="0.7"/>

  <!-- ============ OPEN BOOK (held close to parent's hand at (176,102)) ============ -->
  <g transform="translate(180,100)">
    <!-- book shadow -->
    <ellipse cx="0" cy="20" rx="28" ry="3" fill="#2a1e44" opacity="0.2"/>
    <!-- left page -->
    <path d="M -28 -14 L -2 -17 L -2 16 L -28 13 Z" fill="#fff" stroke="#3f2c66" stroke-width="0.8"/>
    <!-- right page -->
    <path d="M 2 -17 L 28 -14 L 28 13 L 2 16 Z" fill="#fff" stroke="#3f2c66" stroke-width="0.8"/>
    <!-- spine shadow -->
    <path d="M -2 -17 L 2 -17 L 2 16 L -2 16 Z" fill="#c2b1d6"/>
    <!-- text lines left -->
    <line x1="-23" y1="-9" x2="-7" y2="-10" stroke="#694aaa" stroke-width="1.2"/>
    <line x1="-23" y1="-4" x2="-7" y2="-5" stroke="#694aaa" stroke-width="1.2"/>
    <line x1="-23" y1="1" x2="-7" y2="0" stroke="#694aaa" stroke-width="1.2"/>
    <line x1="-23" y1="6" x2="-13" y2="5" stroke="#694aaa" stroke-width="1.2"/>
    <!-- simple illustration on right page -->
    <circle cx="14" cy="-4" r="5" fill="#FEAF31"/>
    <line x1="7" y1="6" x2="22" y2="7" stroke="#694aaa" stroke-width="1.2"/>
    <line x1="7" y1="10" x2="22" y2="11" stroke="#694aaa" stroke-width="1.2"/>
  </g>
  <!-- visible thumb on book left edge so the hand reads as 'holding' it -->
  <ellipse cx="155" cy="100" rx="4" ry="3" fill="#B5825D"/>

  <!-- ============ CHILD (right) ============ -->
  <!-- shoes -->
  <ellipse cx="220" cy="161" rx="9" ry="2.8" fill="#291213"/>
  <ellipse cx="242" cy="161" rx="9" ry="2.8" fill="#291213"/>
  <ellipse cx="218" cy="159.5" rx="4" ry="1" fill="#5c2d2d" opacity="0.7"/>
  <ellipse cx="240" cy="159.5" rx="4" ry="1" fill="#5c2d2d" opacity="0.7"/>

  <!-- pants (two legs) -->
  <path d="M 210 132 C 210 148, 210 158, 212 160 Q 220 162, 228 160 L 230 132 Z" fill="#3e2034"/>
  <path d="M 232 132 L 234 160 Q 242 162, 250 160 C 252 158, 252 148, 252 132 Z" fill="#3e2034"/>
  <path d="M 213 136 L 216 158 Q 217 159 219 159 L 217 136 Z" fill="#1f101a" opacity="0.5"/>
  <path d="M 235 136 L 237 158 Q 238 159 240 159 L 239 136 Z" fill="#1f101a" opacity="0.5"/>

  <!-- shirt (pink) -->
  <path d="M 213 100 C 213 96, 220 94, 228 94 L 234 94 C 242 94, 249 96, 249 100 Q 252 116, 252 132 L 210 132 Q 210 116, 213 100 Z" fill="#9a5183"/>
  <path d="M 213 100 C 213 96, 220 94, 226 94 L 226 132 L 210 132 Q 210 116, 213 100 Z" fill="#5c314f" opacity="0.3"/>
  <path d="M 224 94 L 231 102 L 238 94 L 236 94 L 231 100 L 226 94 Z" fill="#fff" opacity="0.7"/>

  <!-- arms -->
  <path d="M 209 102 Q 207 116, 209 132 L 213 132 Q 213 116, 213 102 Z" fill="#9a5183"/>
  <path d="M 249 102 Q 251 116, 249 132 L 252 132 Q 255 116, 253 102 Z" fill="#9a5183"/>
  <ellipse cx="210" cy="133" rx="4" ry="2" fill="#5c314f"/>
  <ellipse cx="251" cy="133" rx="4" ry="2" fill="#5c314f"/>
  <circle cx="210" cy="138" r="3.5" fill="#C99B7A"/>
  <circle cx="251" cy="138" r="3.5" fill="#C99B7A"/>

  <!-- neck -->
  <rect x="227" y="92" width="8" height="6" fill="#C99B7A"/>
  <rect x="227" y="92" width="3" height="6" fill="#9c6b48" opacity="0.4"/>

  <!-- head -->
  <circle cx="231" cy="80" r="13" fill="#C99B7A"/>
  <path d="M 218 80 A 13 13 0 0 1 231 67 L 231 93 A 13 13 0 0 1 218 80 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="219" cy="81" rx="1.5" ry="2.2" fill="#9c6b48"/>
  <ellipse cx="243" cy="81" rx="1.5" ry="2.2" fill="#9c6b48"/>

  <!-- hair -->
  <path d="M 220 77 C 220 65, 226 62, 231 62 C 236 62, 242 65, 242 77 C 240 73, 237 71, 234 72 C 232 68, 228 68, 226 72 C 224 71, 222 73, 220 77 Z" fill="#2D2825"/>

  <!-- small heart accent -->
  <g transform="translate(395,52)">
    <path d="M 0 4 C -6 -3 -12 -3 -12 3 C -12 9 0 16 0 16 C 0 16 12 9 12 3 C 12 -3 6 -3 0 4 Z" fill="#cb585d" opacity="0.7"/>
  </g>
</svg>
