<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 464 167" width="464" height="167">
  <!-- pale blue background -->
  <rect width="464" height="167" fill="#DFE2F6"/>

  <!-- soft ground -->
  <path d="M 0 158 C 120 152, 344 152, 464 158 L 464 167 L 0 167 Z" fill="#9EA9E4" opacity="0.5"/>

  <!-- decorative dots -->
  <g fill="#5D70D2">
    <circle cx="22" cy="22" r="2.2" opacity="0.45"/>
    <circle cx="48" cy="50" r="1.6" opacity="0.4"/>
    <circle cx="100" cy="20" r="1.8" opacity="0.4"/>
    <circle cx="380" cy="22" r="2" opacity="0.45"/>
    <circle cx="448" cy="100" r="2" opacity="0.4"/>
    <circle cx="438" cy="58" r="1.6" opacity="0.4"/>
    <circle cx="40" cy="125" r="1.5" opacity="0.4"/>
  </g>

  <!-- soft heart background -->
  <g transform="translate(132,8)" opacity="0.35">
    <path d="M 100 152 C -10 80, -10 18, 100 40 C 210 18, 210 80, 100 152 Z" fill="#9EA9E4"/>
  </g>

  <!-- sun -->
  <g transform="translate(420,28)">
    <circle r="14" fill="#FEAF31"/>
    <circle r="10" fill="#FFC571"/>
    <circle r="5" fill="#FFE4B0"/>
  </g>

  <!-- ============ MOTHER ============ -->
  <!-- long dress (no pregnancy bump) -->
  <path d="M 198 60
           C 198 50, 214 46, 232 46
           C 250 46, 266 50, 266 60
           Q 282 100, 296 167
           L 168 167
           Q 182 100, 198 60 Z"
        fill="#5D70D2"/>

  <!-- dress shadow on left -->
  <path d="M 198 60
           C 198 50, 214 46, 226 46
           L 226 100
           Q 220 130, 218 167
           L 168 167
           Q 182 100, 198 60 Z"
        fill="#38437E" opacity="0.3"/>

  <!-- dress hem -->
  <path d="M 174 144
           C 200 152, 264 152, 290 144
           C 292 154, 294 160, 296 167
           L 168 167
           C 170 160, 172 154, 174 144 Z"
        fill="#252D54"/>

  <!-- subtle dress neckline -->
  <path d="M 222 50 C 228 56, 236 56, 242 50" stroke="#252D54" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- ============ MOTHER'S ARMS WRAPPING TO CRADLE BABY ============ -->
  <!-- left arm coming forward and down to support baby -->
  <path d="M 198 64
           C 184 78, 178 96, 184 110
           Q 196 116, 214 112
           L 218 124
           Q 198 130, 184 122
           C 168 110, 168 80, 192 60 Z"
        fill="#5D70D2"/>
  <path d="M 198 64 C 184 78, 178 96, 184 110 Q 192 114, 200 112 L 200 124 Q 192 124, 184 122 C 168 110, 168 80, 192 60 Z"
        fill="#38437E" opacity="0.25"/>

  <!-- right arm coming forward and down to support baby -->
  <path d="M 266 64
           C 280 78, 286 96, 280 110
           Q 268 116, 250 112
           L 246 124
           Q 266 130, 280 122
           C 296 110, 296 80, 272 60 Z"
        fill="#5D70D2"/>

  <!-- mother's hands cradling baby -->
  <ellipse cx="208" cy="118" rx="10" ry="7" fill="#B5825D"/>
  <ellipse cx="208" cy="120" rx="10" ry="2.5" fill="#9c6b48" opacity="0.4"/>
  <ellipse cx="256" cy="118" rx="10" ry="7" fill="#B5825D"/>
  <ellipse cx="256" cy="120" rx="10" ry="2.5" fill="#9c6b48" opacity="0.4"/>

  <!-- ============ BABY (cradled horizontally in mother's arms) ============ -->
  <!-- swaddle blanket (horizontal cradle bundle) -->
  <path d="M 198 92
           C 198 84, 208 80, 232 80
           C 256 80, 266 84, 266 92
           Q 270 108, 264 116
           Q 250 120, 232 120
           Q 214 120, 200 116
           Q 194 108, 198 92 Z"
        fill="#FEAF31"/>
  <!-- swaddle highlight -->
  <path d="M 198 92 C 198 84, 208 80, 226 80 L 226 116 Q 214 120, 200 116 Q 194 108, 198 92 Z"
        fill="#FFD78A" opacity="0.6"/>
  <!-- swaddle fold lines -->
  <path d="M 204 102 C 220 98, 248 98, 262 102" stroke="#cb585d" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 206 110 Q 232 114, 260 108" stroke="#cb585d" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- baby head emerging at top of swaddle -->
  <circle cx="232" cy="74" r="13" fill="#D4A77C"/>
  <!-- head shadow -->
  <path d="M 219 74 A 13 13 0 0 1 232 61 L 232 87 A 13 13 0 0 1 219 74 Z" fill="#a87a52" opacity="0.3"/>
  <!-- baby ears -->
  <ellipse cx="220" cy="75" rx="1.4" ry="2" fill="#a87a52"/>
  <ellipse cx="244" cy="75" rx="1.4" ry="2" fill="#a87a52"/>
  <!-- baby hair tuft -->
  <path d="M 220 67
           C 222 60, 242 60, 244 67
           C 244 67, 240 64, 232 64
           C 224 64, 220 67, 220 67 Z" fill="#2D2825"/>
  <path d="M 226 62 C 230 60, 238 60, 240 63 C 234 62, 228 62, 226 63 Z" fill="#5a4d44" opacity="0.6"/>

  <!-- baby tiny hand peeking from swaddle -->
  <ellipse cx="216" cy="98" rx="4" ry="3" fill="#D4A77C"/>

  <!-- ============ MOTHER HEAD ============ -->
  <!-- neck -->
  <rect x="227" y="44" width="10" height="8" fill="#B5825D"/>
  <rect x="227" y="44" width="3.5" height="8" fill="#9c6b48" opacity="0.4"/>

  <circle cx="232" cy="28" r="17" fill="#B5825D"/>
  <path d="M 215 28 A 17 17 0 0 1 232 11 L 232 45 A 17 17 0 0 1 215 28 Z" fill="#9c6b48" opacity="0.3"/>
  <ellipse cx="215" cy="29" rx="1.8" ry="2.5" fill="#9c6b48"/>
  <ellipse cx="249" cy="29" rx="1.8" ry="2.5" fill="#9c6b48"/>
  <circle cx="215" cy="34" r="1.6" fill="#FEAF31"/>
  <circle cx="249" cy="34" r="1.6" fill="#FEAF31"/>

  <!-- mother hair -->
  <path d="M 215 24 C 215 8, 222 4, 232 4 C 242 4, 249 8, 249 24 C 247 18, 242 16, 238 18 C 234 12, 226 12, 222 18 C 218 16, 217 18, 215 24 Z" fill="#2D2825"/>
  <path d="M 222 8 C 228 6, 236 6, 242 8 C 236 10, 228 10, 222 10 Z" fill="#4d4541" opacity="0.7"/>

  <!-- floating heart accents -->
  <g transform="translate(380,42)" opacity="0.7">
    <path d="M 0 4 C -7 -4 -14 -4 -14 3 C -14 10 0 18 0 18 C 0 18 14 10 14 3 C 14 -4 7 -4 0 4 Z" fill="#cb585d"/>
  </g>
  <g transform="translate(60,48)" opacity="0.6">
    <path d="M 0 3 C -5 -3 -10 -3 -10 2 C -10 7 0 12 0 12 C 0 12 10 7 10 2 C 10 -3 5 -3 0 3 Z" fill="#cb585d"/>
  </g>
</svg>
