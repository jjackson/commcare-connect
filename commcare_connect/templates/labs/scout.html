{% extends "base.html" %}

{% block content %}
<div class="flex flex-col" style="height: calc(100vh - 120px);">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold text-gray-900">
      <i class="fa-solid fa-robot text-indigo-600 mr-2"></i>
      Scout Data Agent
    </h1>
  </div>

  <!-- Auth prompt (shown when Scout requires login) -->
  <div id="scout-auth-prompt" style="display: none;"
       class="flex-1 rounded-lg border border-gray-200 bg-white flex flex-col items-center justify-center text-center p-8">
    <i class="fa-solid fa-lock text-4xl text-gray-400 mb-4"></i>
    <h2 class="text-lg font-semibold text-gray-700 mb-2">Scout Authentication Required</h2>
    <p class="text-gray-500 mb-6 max-w-md">Sign in to Scout in a new window, then come back here.</p>
    <button id="scout-login-btn"
            class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium">
      Sign in to Scout
    </button>
  </div>

  <!-- Scout widget container (hidden when auth prompt is shown) -->
  <div id="scout-container" class="flex-1 rounded-lg overflow-hidden border border-gray-200 bg-white"></div>
</div>

<script>
  window.ScoutWidget = window.ScoutWidget || { _q: [] };
  ScoutWidget.init = function(opts) { ScoutWidget._q.push(['init', opts]); };
</script>
<script async src="{{ scout_url }}/widget.js"></script>
<script>
  var SCOUT_URL = "{{ scout_url }}";
  var authPrompt = document.getElementById("scout-auth-prompt");
  var container = document.getElementById("scout-container");

  ScoutWidget.init({
    container: "#scout-container",
    mode: "full",
    theme: "light",
    tenant: "{{ opportunity_id }}",
    onReady: function() {
      console.log("[Scout] Widget ready");
      authPrompt.style.display = "none";
      container.style.display = "";
    },
    onEvent: function(event) {
      console.log("[Scout] Event:", event);
      if (event.type === "scout:auth-required") {
        container.style.display = "none";
        authPrompt.style.display = "flex";
      }
    },
  });

  document.getElementById("scout-login-btn").addEventListener("click", function() {
    // Trailing slash is required so ALB routes to Scout's nginx, not connect-labs gunicorn
    var loginUrl = SCOUT_URL.replace(/\/$/, "") + "/";
    var popup = window.open(loginUrl, "scout-login", "width=600,height=700");

    var check = setInterval(function() {
      if (popup && popup.closed) {
        clearInterval(check);
        // Full page reload so the widget re-initializes with the new session
        window.location.reload();
      }
    }, 500);
  });
</script>
{% endblock %}
