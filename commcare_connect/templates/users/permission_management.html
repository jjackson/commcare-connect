{% extends "base.html" %}
{% load i18n %}

{% block title %}Permission Management{% endblock %}

{% block content %}
<div class="container">
    <h2 class="text-xl font-semibold text-brand-deep-purple mb-4">{% translate "Permission Management" %}</h2>
    <div class="card_bg mb-4">
        <form hx-get="{% url 'users:permission_management_search' %}"
              hx-target="#results"
              hx-swap="innerHTML"
              class="flex items-end gap-4">
            <div class="flex-1">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    {% translate "User Email" %}
                </label>
                <input type="email"
                       name="email"
                       id="email"
                       placeholder="user@example.com"
                       required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-brand-deep-purple focus:ring-brand-deep-purple sm:text-sm">
            </div>
            <button type="submit" class="button button-md primary-dark">
                {% translate "Search" %}
            </button>
        </form>
    </div>
    <div id="results"></div>
</div>
{% endblock content %}
