{% load i18n %}

<script>
/**
 * Confirm modal store.
 *
 * Usage:
 *   $store.confirmModal.show({
 *     title: 'Delete Tasks',              // Modal heading
 *     message: 'Are you sure?',           // Body text
 *     confirmBtnText: 'Delete',           // Confirm button label (default: 'Confirm')
 *     confirmBtnColor: 'red',             // 'primary' (default) or 'red' for destructive actions
 *     formRef: $refs.myForm,              // Form element to submit on confirm (optional)
 *     onConfirm: () => { ... },           // Callback after confirm (optional)
 *     onCancel: () => { ... },            // Callback after cancel/escape/click-outside (optional)
 *   })
 *
 * - confirm() submits formRef (if provided), runs onConfirm, then closes.
 * - close() runs onCancel, then closes. Triggered by Cancel, Escape, or click-outside.
 */
document.addEventListener('alpine:init', () => {
  if (!Alpine.store('confirmModal')) {
    Alpine.store('confirmModal', {
      open: false,
      title: '',
      message: '',
      confirmBtnText: '',
      confirmBtnColor: 'primary',
      _formRef: null,
      _onConfirm: null,
      _onCancel: null,

      show({ title, message, confirmBtnText, confirmBtnColor, formRef, onConfirm, onCancel }) {
        this.title = title || '';
        this.message = message || '';
        this.confirmBtnText = confirmBtnText || '';
        this.confirmBtnColor = confirmBtnColor || 'primary';
        this._formRef = formRef || null;
        this._onConfirm = onConfirm || null;
        this._onCancel = onCancel || null;
        this.open = true;
      },

      confirm() {
        if (this._formRef) {
          this._formRef.requestSubmit();
        }
        if (this._onConfirm) {
          this._onConfirm();
        }
        this.open = false;
        this._formRef = null;
        this._onConfirm = null;
        this._onCancel = null;
      },

      close() {
        this.open = false;
        if (this._onCancel) {
          this._onCancel();
        }
        this._formRef = null;
        this._onConfirm = null;
        this._onCancel = null;
      },
    });
  }
});
</script>

<div x-data x-show="$store.confirmModal.open" x-cloak x-transition.opacity
    class="modal-backdrop"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-modal-title"
    @keydown.escape.window="$store.confirmModal.close()">
    <div @click.outside="$store.confirmModal.close()" class="modal">

        <div class="flex justify-between items-center pb-2 mb-4">
            <h2 id="confirm-modal-title" class="text-lg font-medium text-brand-deep-purple"
                x-text="$store.confirmModal.title">
            </h2>
            <button @click="$store.confirmModal.close()"
                    class="text-gray-500 hover:text-gray-700"
                    aria-label="{% trans 'Close dialog' %}">
                <i class="fa-solid fa-xmark text-xl" aria-hidden="true"></i>
            </button>
        </div>

        <div class="mb-6">
            <p class="text-gray-700 mb-2" x-text="$store.confirmModal.message"></p>
        </div>

        <div class="flex justify-end gap-4 pt-4">
            <button type="button" class="button button-md outline-style"
                    @click="$store.confirmModal.close()">
                {% trans 'Cancel' %}
            </button>
            <button type="button" class="button button-md text-white"
                    :class="$store.confirmModal.confirmBtnColor === 'red'
                        ? 'bg-red-600 hover:bg-red-700'
                        : 'bg-brand-deep-purple hover:bg-brand-deep-purple/90'"
                    @click="$store.confirmModal.confirm()">
                <span x-text="$store.confirmModal.confirmBtnText || '{% trans "Confirm" %}'"></span>
            </button>
        </div>
    </div>
</div>
