<script>
  // Alpine mixin for checkbox select-all. Options: selector (CSS), exclude (value to skip).
  window.selectableTable = (opts = {}) => {
    const selector = opts.selector || 'input[name="row_select"]';

    return {
      selected: [],
      selectAll: false,

      toggleSelectAll() {
        this.selectAll = !this.selectAll;
        this.selected = this.selectAll
          ? Array.from(document.querySelectorAll(selector))
            .filter((c) => !c.disabled && (!opts.exclude || c.value !== opts.exclude))
            .map((c) => c.value)
          : [];
      },

      updateSelectAll() {
        const total = Array.from(document.querySelectorAll(selector))
          .filter((c) => !c.disabled && (!opts.exclude || c.value !== opts.exclude)).length;
        this.selectAll = total > 0 && this.selected.length === total;
      },
    };
  };
</script>
